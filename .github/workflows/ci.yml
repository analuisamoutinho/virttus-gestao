name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: virttus/package-lock.json
      - working-directory: virttus
        run: npm ci
      - working-directory: virttus
        run: npx prisma generate
      - working-directory: virttus
        run: npm run lint
      - working-directory: virttus
        run: npm run typecheck
      - working-directory: virttus
        run: npm test
